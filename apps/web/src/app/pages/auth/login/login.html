<div class="split-login">

  <div class="split-login-left">
    <div class="split-login-content">
      <div class="split-login-logo">Seismic</div>

      @if (!sent()) {
        <h1 class="login-title">Log in</h1>
        <p class="login-subtitle">Your code speaks. We listen.</p>

        <div class="login-form">
          <label class="field-label">Email</label>
          <input
            type="email"
            class="input"
            placeholder="Enter your email"
            [(ngModel)]="email"
            (keydown.enter)="requestMagicLink()"
          />

          <button
            class="btn-primary btn-full"
            [disabled]="loading() || !email()"
            (click)="requestMagicLink()"
          >
            {{ loading() ? 'Sending...' : 'Continue with email' }}
          </button>
        </div>

        <p class="login-footer">
          By continuing, you agree to Seismic's
          <a routerLink="/terms">Terms</a> and
          <a routerLink="/privacy">Privacy Policy</a>.
        </p>
      } @else {
        <div class="login-confirmation">
          <div class="login-confirmation-icon">
            <lucide-angular [img]="MailboxIcon" [size]="36" />
          </div>
          <h1 class="login-title">Check your email</h1>
          <p class="login-subtitle">We sent a login link to<br><strong>{{ email() }}</strong></p>
        </div>
      }
    </div>
  </div>

  <div class="split-login-right">
    <img
      ngSrc="images/login-hero.png"
      alt=""
      fill=""
      priority=""
      class="split-hero-image"
    />
  </div>

</div>
