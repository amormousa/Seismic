basePath: /
definitions:
  handlers.completeSignupRequest:
    properties:
      displayName:
        type: string
      signupToken:
        type: string
      username:
        type: string
    type: object
  handlers.magicLinkRequest:
    properties:
      email:
        type: string
    type: object
  helpers.APIResponse:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  models.Heartbeat:
    properties:
      branch:
        type: string
      cursorLine:
        type: integer
      editor:
        type: string
      file:
        type: string
      language:
        type: string
      lines:
        type: integer
      machine:
        type: string
      os:
        type: string
      project:
        type: string
      time:
        type: integer
      timezone:
        type: string
    type: object
info:
  contact:
    email: hello@seismic.icu
  description: Backend API for Seismic, a developer time tracking platform.
  title: Seismic API
  version: "1.0"
paths:
  /api/admin/process-sessions:
    post:
      description: Runs the session processor immediately instead of waiting for the
        5 minute timer. For testing only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Manually trigger session processing
      tags:
      - admin
  /api/auth/apikey:
    get:
      description: Returns the logged-in user's API key, used to configure editor
        plugins.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get API key
      tags:
      - auth
  /api/auth/apikey/regenerate:
    post:
      description: Replaces the user's API key, invalidating any editor plugins still
        using the old one.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Regenerate API key
      tags:
      - auth
  /api/auth/check-username:
    get:
      description: Checks if a username is valid and not already taken.
      parameters:
      - description: Username to check
        in: query
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      summary: Check username availability
      tags:
      - auth
  /api/auth/complete-signup:
    post:
      consumes:
      - application/json
      description: Creates the account using the signup token from VerifyMagicLink,
        once a username is chosen.
      parameters:
      - description: Signup details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.completeSignupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      summary: Complete signup for a new user
      tags:
      - auth
  /api/auth/magic-link:
    post:
      consumes:
      - application/json
      description: Sends a login link to the given email. Works for both new and existing
        users.
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.magicLinkRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      summary: Request a magic link
      tags:
      - auth
  /api/auth/me:
    get:
      description: Returns the logged-in user's profile information.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /api/auth/refresh:
    post:
      description: Uses the refresh token cookie to issue a new access token and rotate
        the refresh token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      summary: Refresh access token
      tags:
      - auth
  /api/auth/verify:
    get:
      description: Validates the token from the login email. Logs in existing users,
        or returns a signup token for new users.
      parameters:
      - description: Magic link token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      summary: Verify a magic link token
      tags:
      - auth
  /api/filters/languages:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get distinct languages coded
      tags:
      - filters
  /api/filters/projects:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get distinct projects coded
      tags:
      - filters
  /api/goals:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get active goals with progress
      tags:
      - goals
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Create a new goal
      tags:
      - goals
  /api/goals/{id}:
    delete:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete a goal
      tags:
      - goals
    put:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Update a goal
      tags:
      - goals
  /api/heartbeat:
    post:
      consumes:
      - application/json
      description: Called by editor plugins every 2 minutes to record coding activity.
        Requires an API key, not a JWT.
      parameters:
      - description: Heartbeat payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.Heartbeat'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Send a heartbeat
      tags:
      - heartbeat
  /api/leaderboard:
    get:
      description: Returns ranked users by total coding time within a range. If authenticated,
        includes the viewer's own rank.
      parameters:
      - default: today
        description: today, week, month, or all
        in: query
        name: range
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      summary: Get leaderboard
      tags:
      - leaderboard
  /api/settings/account:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete account
      tags:
      - settings
  /api/settings/privacy:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get privacy settings
      tags:
      - settings
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Update privacy settings
      tags:
      - settings
  /api/settings/reset-timers:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Reset all coding stats
      tags:
      - settings
  /api/stats/heatmap:
    get:
      description: Returns daily coding totals for the last 365 days, like a GitHub
        contribution graph.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get coding heatmap
      tags:
      - stats
  /api/stats/languages:
    get:
      description: Returns time spent per programming language for a time range.
      parameters:
      - default: week
        description: today, week, month, or all
        in: query
        name: range
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get language breakdown
      tags:
      - stats
  /api/stats/summary:
    get:
      description: Returns total time, top language, top project, daily average, and
        current streak for a time range.
      parameters:
      - default: today
        description: today, week, month, or all
        in: query
        name: range
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get stats summary
      tags:
      - stats
  /health:
    get:
      description: Returns ok if the server is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
